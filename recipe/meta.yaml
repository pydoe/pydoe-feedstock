{% set version = "0.9.9" %}
{% set python_min = "3.10" %}

package:
  name: pydoe
  version: {{ version }}

source:
  git_url: https://github.com/pydoe/pydoe
  git_rev: v{{ version }}

build:
  noarch: python
  script: {{ PYTHON }} -m pip install --no-deps --ignore-installed .
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling >=1.26
    - hatch-vcs

  run:
    - python >={{ python_min }}
    # The pinned version on upstream [1.15.3] is not released on conda-forge
    # so last stable version is pinned as base. see pydoe/pydoe#109
    - scipy >=1.15.2
    - numpy >=2.2.6

test:
  requires:
    - python {{ python_min }}
    - pytest
    - pytest-xdist
  imports:
    - pydoe
  commands:
    - pytest --pyargs pydoe -v -n auto --doctest-modules --no-header -p no:cacheprovider

about:
  home: https://github.com/pydoe/pydoe
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Design of experiments for Python
  description: |
     pydoe is a package for constructing experimental designs, supporting
     factorial designs, response surface methods, optimal designs, space-filling
     designs, Taguchi methods, sparse grids, and sensitivity analysis.
  doc_url: https://pydoe.github.io/pydoe/
  dev_url: https://github.com/pydoe/pydoe

extra:
  recipe-maintainers:
    - saudzahirr
    - melund
    - laraibg786
